services:
  postgres:
    image: postgres:16-alpine
    container_name: linkedout-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkedout
      POSTGRES_PASSWORD: linkedout
      POSTGRES_DB: linkedout
    ports:
      - '5432:5432'
    volumes:
      - linkedout_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U linkedout -d linkedout']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  linkedout_pgdata:
