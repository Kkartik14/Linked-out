name: CI

# Runs on every PR into main, and on pushes to main so the branch always carries a
# green (or red) status for the required checks below.
on:
  pull_request:
  push:
    branches: [main]

# One in-flight run per branch/PR; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # The e2e/integration harnesses default to these secrets; pin them so the API the
  # tests boot and the cookies the harness mints agree.
  E2E_JWT_ACCESS_SECRET: e2e-access-secret-0123456789abcdef

jobs:
  # ── Static checks + web unit tests. No database needed. ──────────────────────
  checks:
    name: checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prisma generate reads the schema, not a live DB, but a value keeps it quiet.
      DATABASE_URL: postgresql://linkedout:linkedout@localhost:5432/linkedout?schema=public
    steps:
      - uses: actions/checkout@v4

      # No version input: pnpm's version comes from the root package.json
      # `packageManager` field. Passing both sources errors.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/web/pnpm-lock.yaml

      - name: Install backend workspace
        run: pnpm install --frozen-lockfile

      # Build BEFORE installing the web workspace: apps/web consumes
      # @linkedout/contracts as a file: dependency, which pnpm materialises as a copy
      # at install time. If contracts/dist doesn't exist yet, that copy has no types
      # and every web import fails to resolve. Building first fills in the dist.
      - name: Build packages + API
        run: pnpm build

      # Build the backend workspace once per workflow. Database/e2e jobs download these exact
      # outputs instead of compiling the same commit two more times (no Turbo required).
      - name: Upload backend build
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            packages/contracts/dist
            packages/db/dist
            packages/db/generated
            apps/api/dist
          if-no-files-found: error
          retention-days: 1

      - name: Install web workspace
        run: pnpm install --frozen-lockfile
        working-directory: apps/web

      - name: Typecheck (contracts, db, api)
        run: pnpm typecheck

      - name: Lint (contracts, db, api)
        run: pnpm lint

      - name: Typecheck (web)
        run: pnpm --dir apps/web typecheck

      - name: Lint (web)
        run: pnpm --dir apps/web lint

      - name: Unit tests (web)
        run: pnpm --dir apps/web test

  # ── API unit + integration against a real Postgres. ─────────────────────────
  api-tests:
    name: api-tests
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linkedout
          POSTGRES_PASSWORD: linkedout
          POSTGRES_DB: linkedout_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U linkedout -d linkedout_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # TEST-01: the destructive DB flags are scoped to the destructive steps below, NOT the
      # whole job, so build/install never run with reset permission.
      TEST_DATABASE_URL: postgresql://linkedout:linkedout@localhost:5432/linkedout_test?schema=public
      DATABASE_URL: postgresql://linkedout:linkedout@localhost:5432/linkedout_test?schema=public
      DIRECT_URL: postgresql://linkedout:linkedout@localhost:5432/linkedout_test?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install backend workspace
        run: pnpm install --frozen-lockfile

      - name: Download backend build
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: .

      # Guard (exact name + session role) and plant the fingerprinted marker BEFORE the destructive
      # migrate DDL — the guard runs on this destructive step only.
      - name: Bootstrap + migrate the test database
        env:
          ALLOW_TEST_DB_RESET: "1"
          TEST_DB_EXPECTED_SESSION_USER: linkedout
        run: |
          node scripts/bootstrap-test-db.cjs
          node scripts/migrate-test-db.cjs

      - name: Unit tests (API)
        # The artifact came from this workflow's single build; avoid rebuilding while still
        # using the explicit "built" test entrypoint that imports compiled modules.
        run: pnpm --filter @linkedout/api test:unit:built

      # Boots the real NestJS server (twice — one with uploads, one without) over HTTP
      # against the Postgres service, and validates every response with the shared Zod
      # contract. See apps/api/test/README.md.
      - name: Integration tests (API + real Postgres)
        env:
          ALLOW_TEST_DB_RESET: "1"
          TEST_DB_EXPECTED_SESSION_USER: linkedout
        run: pnpm --filter @linkedout/api test:integration

  # ── Full-stack e2e: real browser → real Next app → real API → real Postgres. ─
  e2e-tests:
    name: e2e-tests
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linkedout
          POSTGRES_PASSWORD: linkedout
          POSTGRES_DB: linkedout_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U linkedout -d linkedout_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # TEST-01: destructive DB flags are scoped to the destructive steps below (provision +
      # migrate, and the e2e run via apps/web `test:e2e`), not the whole job.
      TEST_DATABASE_URL: postgresql://linkedout:linkedout@localhost:5432/linkedout_test?schema=public
      DATABASE_URL: postgresql://linkedout:linkedout@localhost:5432/linkedout_test?schema=public
      DIRECT_URL: postgresql://linkedout:linkedout@localhost:5432/linkedout_test?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/web/pnpm-lock.yaml

      - name: Install backend workspace
        run: pnpm install --frozen-lockfile

      # Download BEFORE installing web: apps/web consumes contracts as a file dependency, so
      # contracts/dist must exist when pnpm materialises that package. The artifact also carries
      # the API executable and generated Prisma client used by Playwright's backend process.
      - name: Download backend build
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: .

      - name: Install web workspace
        run: pnpm install --frozen-lockfile
        working-directory: apps/web

      # Guard + plant the fingerprinted marker BEFORE the destructive migrate DDL.
      - name: Bootstrap + migrate the test database
        env:
          ALLOW_TEST_DB_RESET: "1"
          TEST_DB_EXPECTED_SESSION_USER: linkedout
        run: |
          node scripts/bootstrap-test-db.cjs
          node scripts/migrate-test-db.cjs

      - name: Install Playwright browser
        run: pnpm --dir apps/web exec playwright install --with-deps chromium

      # test:e2e builds the Next app, then Playwright boots the API + web servers and
      # drives Chromium against them.
      - name: e2e tests (Playwright + real API + real Postgres)
        run: pnpm --dir apps/web test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: apps/web/test-results
          retention-days: 7
          if-no-files-found: ignore
